<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — VCC Social Toolkit</title>
<link rel="stylesheet" href="css/style.css">
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.auth-wrap { width: 100%; max-width: 420px; padding: 24px; }
.auth-logo { text-align: center; margin-bottom: 32px; }
.auth-logo-box {
  width: 50px; height: 50px;
  border: 2px solid var(--neon);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 11px; color: var(--neon);
  margin: 0 auto 12px;
}
.auth-logo-text { font-size: 20px; font-weight: 700; letter-spacing: 3px; color: var(--neon); text-transform: uppercase; }
.auth-logo-sub { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
.auth-box { background: var(--panel); border: 1px solid var(--border); padding: 28px; position: relative; }
.auth-box::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon), transparent);
}
.auth-title { font-family: var(--mono); font-size: 10px; color: var(--neon); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px; }
.auth-switch { text-align: center; margin-top: 16px; font-size: 13px; color: var(--muted); }
.auth-switch a { color: var(--neon2); text-decoration: none; }
.auth-switch a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-logo">
    <div class="auth-logo-box">VCC</div>
    <div class="auth-logo-text">VCC Social Toolkit</div>
    <div class="auth-logo-sub">Premium Social Media Services</div>
  </div>

  <div class="auth-box" id="login-box">
    <div class="auth-title">&gt; USER_LOGIN</div>
    <div id="login-err"></div>
    <div class="form-group">
      <label>Email or Username</label>
      <input type="text" id="login-email" placeholder="your@email.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••••" />
    </div>
    <button class="btn btn-neon btn-full" onclick="doLogin()" id="login-btn">Login →</button>
    <div class="auth-switch">Don't have an account? <a href="register.html">Sign Up</a></div>
  </div>
</div>

<script src="js/config.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = 'dashboard.html';

  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    const err   = document.getElementById('login-err');
    const btn   = document.getElementById('login-btn');
    err.innerHTML = '';

    if (!email || !pass) {
      err.innerHTML = '<div class="alert alert-error">Fill all fields.</div>'; return;
    }
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span>';
    try {
      const data = await apiCall('/api/login', 'POST', { email, password: pass });
      Auth.setSession(data.token, { username: data.username, balance: data.balance });
      window.location.href = 'dashboard.html';
    } catch (e) {
      err.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
      btn.disabled = false; btn.innerHTML = 'Login →';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
