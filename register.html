<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — VCC Social Toolkit</title>
<link rel="stylesheet" href="css/style.css">
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.auth-wrap { width: 100%; max-width: 420px; padding: 24px; }
.auth-logo { text-align: center; margin-bottom: 32px; }
.auth-logo-box { width: 50px; height: 50px; border: 2px solid var(--neon); display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 11px; color: var(--neon); margin: 0 auto 12px; }
.auth-logo-text { font-size: 20px; font-weight: 700; letter-spacing: 3px; color: var(--neon); text-transform: uppercase; }
.auth-logo-sub { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
.auth-box { background: var(--panel); border: 1px solid var(--border); padding: 28px; position: relative; }
.auth-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--neon), transparent); }
.auth-title { font-family: var(--mono); font-size: 10px; color: var(--neon); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px; }
.auth-switch { text-align: center; margin-top: 16px; font-size: 13px; color: var(--muted); }
.auth-switch a { color: var(--neon2); text-decoration: none; }
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-logo">
    <div class="auth-logo-box">VCC</div>
    <div class="auth-logo-text">VCC Social Toolkit</div>
    <div class="auth-logo-sub">Create Your Account</div>
  </div>

  <div class="auth-box">
    <div class="auth-title">&gt; NEW_ACCOUNT</div>
    <div id="reg-msg"></div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="reg-user" placeholder="cooluser123" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="your@email.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="reg-pass" placeholder="Min 6 characters" />
    </div>
    <button class="btn btn-neon btn-full" onclick="doRegister()" id="reg-btn">Create Account →</button>
    <div class="auth-switch">Already have an account? <a href="login.html">Login</a></div>
  </div>
</div>

<script src="js/config.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = 'dashboard.html';

  async function doRegister() {
    const username = document.getElementById('reg-user').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-pass').value;
    const msg      = document.getElementById('reg-msg');
    const btn      = document.getElementById('reg-btn');
    msg.innerHTML  = '';

    if (!username || !email || !password) {
      msg.innerHTML = '<div class="alert alert-error">Fill all fields.</div>'; return;
    }
    if (password.length < 6) {
      msg.innerHTML = '<div class="alert alert-error">Password must be at least 6 characters.</div>'; return;
    }
    btn.disabled = true; btn.innerHTML = '<span class="loader"></span>';
    try {
      const data = await apiCall('/api/register', 'POST', { username, email, password });
      Auth.setSession(data.token, { username: data.username, balance: data.balance });
      window.location.href = 'dashboard.html';
    } catch (e) {
      msg.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
      btn.disabled = false; btn.innerHTML = 'Create Account →';
    }
  }
</script>
</body>
</html>
