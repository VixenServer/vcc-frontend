<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders — VCC Social Toolkit</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-box">VCC</div>
    <div class="nav-logo-text">VCC Social Toolkit</div>
  </a>
  <div class="nav-links">
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <a href="services.html" class="nav-link">Services</a>
    <a href="orders.html" class="nav-link active">Orders</a>
    <a href="deposit.html" class="nav-link">Add Funds</a>
    <span class="nav-balance" id="nav-bal">৳0.00</span>
    <a href="profile.html" class="nav-link">Profile</a>
    <button class="btn-logout" onclick="Auth.clear();window.location.href='login.html'">Logout</button>
  </div>
</nav>

<div class="container">
  <div class="page-title">&gt; ORDER_HISTORY</div>
  <div class="page-heading">My Orders</div>

  <div class="card" style="padding:0;overflow:hidden;">
    <div id="orders-wrap" style="padding:40px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:12px;">
      Loading orders...
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script>
  if (!requireLogin()) {}

  const u = Auth.getUser();
  if (u) document.getElementById('nav-bal').textContent = '৳' + (parseFloat(u.balance)||0).toFixed(2);

  const platClass = {Facebook:'fb',Instagram:'ig',YouTube:'yt',TikTok:'tk',Telegram:'tg',Twitter:'tw'};

  async function loadOrders() {
    try {
      const orders = await apiCall('/api/orders');
      const wrap = document.getElementById('orders-wrap');
      if (!orders.length) {
        wrap.innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:12px;">
          No orders yet. <a href="services.html" style="color:var(--neon)">Place your first order →</a></div>`;
        return;
      }
      wrap.innerHTML = `
        <table class="vcc-table">
          <thead><tr>
            <th>#</th><th>Platform</th><th>Service</th>
            <th>Qty</th><th>Link</th><th>Charge</th><th>Status</th><th>Date</th><th></th>
          </tr></thead>
          <tbody>
            ${orders.map(o => `<tr>
              <td class="mono text-muted">${o.id}</td>
              <td><span class="badge badge-${platClass[o.platform]||'fb'}">${o.platform}</span></td>
              <td style="font-weight:600">${o.service_name}</td>
              <td class="mono">${Number(o.quantity).toLocaleString()}</td>
              <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;font-size:11px;color:var(--muted)">
                <a href="${o.link}" target="_blank" style="color:var(--neon2);text-decoration:none;">${o.link.slice(0,30)}...</a>
              </td>
              <td class="mono text-neon">৳${parseFloat(o.charge).toFixed(2)}</td>
              <td><span class="badge badge-${o.status}">${o.status}</span></td>
              <td class="text-muted" style="font-size:11px">${o.created_at.slice(0,10)}</td>
              <td>
                <button class="btn btn-outline btn-sm" onclick="checkStatus(${o.id}, this)">
                  Check
                </button>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    } catch(e) {
      if (e.message === 'Invalid token') { Auth.clear(); window.location.href = 'login.html'; }
    }
  }

  async function checkStatus(orderId, btn) {
    btn.disabled = true; btn.innerHTML = '<span class="loader"></span>';
    try {
      const res = await apiCall(`/api/orders/${orderId}/status`);
      toast(`Order #${orderId}: ${res.status}${res.remains ? ' (Remains: '+res.remains+')' : ''}`, 'info');
      loadOrders();
    } catch(e) {
      toast(e.message, 'error');
    }
    btn.disabled = false; btn.innerHTML = 'Check';
  }

  loadOrders();
</script>
</body>
</html>
