<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Services — VCC Social Toolkit</title>
<link rel="stylesheet" href="css/style.css">
<style>
.order-modal-bg {
  display: none;
  position: fixed; inset: 0;
  background: rgba(3,6,8,0.92);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.order-modal-bg.open { display: flex; }
.order-modal {
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 28px;
  width: 100%; max-width: 480px;
  position: relative;
}
.order-modal::before { content:''; position:absolute; top:0;left:0;right:0;height:2px; background:linear-gradient(90deg,transparent,var(--neon),transparent); }
.modal-close { position:absolute; top:14px; right:16px; background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; font-family:var(--mono); }
.modal-close:hover { color:var(--red); }
.summary-box { background:var(--darker); border:1px solid var(--border); padding:14px; margin:12px 0; }
.sum-row { display:flex; justify-content:space-between; padding:5px 0; font-size:13px; border-bottom:1px solid rgba(0,255,157,0.06); }
.sum-row:last-child { border:none; }
.sum-row .l { color:var(--muted); }
.sum-row .v { font-family:var(--mono); }
.filter-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; align-items:center; }
.filter-btn {
  background:var(--panel);
  border:1px solid var(--border);
  color:var(--muted);
  padding:6px 12px;
  font-family:var(--sans);
  font-size:11px;
  font-weight:600;
  letter-spacing:1px;
  text-transform:uppercase;
  cursor:pointer;
  transition:all 0.2s;
  display:flex;
  align-items:center;
  gap:6px;
}
.filter-btn:hover,.filter-btn.active { color:var(--neon); border-color:var(--neon); background:rgba(0,255,157,0.05); }
.filter-btn img {
  width:18px;
  height:18px;
  object-fit:contain;
  border-radius:3px;
}
.plat-icon {
  width:20px;
  height:20px;
  object-fit:contain;
  border-radius:3px;
  vertical-align:middle;
  margin-right:4px;
}
.badge-with-icon {
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:4px 8px;
  border:1px solid var(--border);
  font-size:10px;
  font-weight:700;
  letter-spacing:1.5px;
  text-transform:uppercase;
  white-space:nowrap;
}
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-box">VCC</div>
    <div class="nav-logo-text">VCC Social Toolkit</div>
  </a>
  <div class="nav-links" id="nav-right">
    <a href="login.html" class="nav-link">Login</a>
    <a href="register.html" class="btn btn-neon btn-sm">Sign Up</a>
  </div>
</nav>

<div class="container">
  <div class="page-title">&gt; SERVICES</div>
  <div class="page-heading">All Services</div>

  <div class="filter-row" id="filters"></div>

  <div class="card" style="padding:0; overflow:hidden;">
    <div id="srv-loading" style="text-align:center;padding:40px;color:var(--muted);font-family:var(--mono);font-size:12px;">
      Loading services...
    </div>
    <table class="vcc-table" id="srv-table" style="display:none;">
      <thead><tr>
        <th>Platform</th>
        <th>Service</th>
        <th>Min / Max</th>
        <th>Price / 1000</th>
        <th></th>
      </tr></thead>
      <tbody id="srv-body"></tbody>
    </table>
  </div>
</div>

<!-- Order Modal -->
<div class="order-modal-bg" id="order-modal">
  <div class="order-modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="auth-title" style="font-family:var(--mono);font-size:10px;color:var(--neon);letter-spacing:4px;text-transform:uppercase;margin-bottom:18px;">
      &gt; PLACE_ORDER
    </div>
    <div id="modal-msg"></div>
    <div style="background:var(--darker);border:1px solid var(--border);border-left:3px solid var(--neon2);padding:12px;margin-bottom:14px;">
      <div style="font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;">Service</div>
      <div style="font-weight:700;color:var(--text);" id="modal-srv-name">—</div>
      <div style="font-family:var(--mono);font-size:12px;color:var(--neon);margin-top:4px;" id="modal-price-label">—</div>
    </div>
    <div class="form-group">
      <label>Target URL / Link</label>
      <input type="text" id="modal-link" placeholder="https://..." />
    </div>
    <div class="form-group">
      <label>Quantity (<span id="modal-min-max">—</span>)</label>
      <input type="number" id="modal-qty" value="1000" min="100" step="100" oninput="updateModalCalc()" />
    </div>
    <div class="summary-box">
      <div class="sum-row"><span class="l">Quantity</span><span class="v" id="calc-qty">—</span></div>
      <div class="sum-row"><span class="l">Total Charge</span><span class="v text-neon" id="calc-charge">—</span></div>
    </div>
    <button class="btn btn-neon btn-full" onclick="submitOrder()" id="modal-submit-btn">Place Order →</button>
  </div>
</div>

<script src="js/config.js"></script>
<script>
  let allServices = [];
  let selectedSrv = null;

  // Platform icons map
  const platIcons = {
    'Facebook':  'https://storage.perfectcdn.com/9ueuxb/40ebys0coedrchz6.gif',
    'Instagram': 'https://storage.perfectcdn.com/9ueuxb/7a2i8fnwmmjoly57.gif',
    'YouTube':   'https://storage.perfectcdn.com/9ueuxb/eiqldqojcicy8412.gif',
    'TikTok':    'https://storage.perfectcdn.com/9ueuxb/appwcywdnc615rw5.gif',
    'Telegram':  'https://storage.perfectcdn.com/9ueuxb/4zlwryubhuixzdcw.png',
    'Twitter':   'https://storage.perfectcdn.com/9ueuxb/9a7mndu7p2j1kq53.gif',
    'LinkedIn':  'https://storage.perfectcdn.com/9ueuxb/3xfg33ubb1n1idlk.png',
  };

  const platColors = {
    Facebook:'#1877f2', Instagram:'#e1306c', YouTube:'#ff0000',
    TikTok:'#00f2ea', Telegram:'#2aabee', Twitter:'#1da1f2',
    LinkedIn:'#0a66c2',
  };

  function getPlatIcon(plat) {
    return platIcons[plat] || platIcons[Object.keys(platIcons).find(k => k.toLowerCase() === plat.toLowerCase())] || '';
  }
  function getPlatColor(plat) {
    return platColors[plat] || platColors[Object.keys(platColors).find(k => k.toLowerCase() === plat.toLowerCase())] || 'var(--neon)';
  }

  // Nav
  if (Auth.isLoggedIn()) {
    const u = Auth.getUser();
    document.getElementById('nav-right').innerHTML = `
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="orders.html" class="nav-link">Orders</a>
      <a href="deposit.html" class="nav-link">Add Funds</a>
      <a href="profile.html" class="nav-link">Profile</a>
      <span class="nav-balance">৳${(parseFloat(u.balance)||0).toFixed(2)}</span>
      <button class="btn-logout" onclick="Auth.clear();window.location.href='login.html'">Logout</button>`;
  }

  function buildFilters(services) {
    const platforms = ['all', ...new Set(services.map(s => s.platform))];
    const filtersEl = document.getElementById('filters');
    filtersEl.innerHTML = platforms.map((p, i) => {
      const icon = p === 'all' ? '' : getPlatIcon(p);
      const label = p === 'all' ? 'All' : p;
      return `<button class="filter-btn ${i===0?'active':''}" onclick="filterBy('${p}',this)">
        ${icon ? `<img src="${icon}" alt="${label}" onerror="this.style.display='none'">` : ''}
        ${label}
      </button>`;
    }).join('');
  }

  async function loadServices() {
    try {
      allServices = await apiCall('/api/services');
      buildFilters(allServices);
      renderTable(allServices);
    } catch(e) {
      document.getElementById('srv-loading').textContent = 'Failed to load services.';
    }
  }

  function renderTable(srvs) {
    document.getElementById('srv-loading').style.display = 'none';
    const table = document.getElementById('srv-table');
    table.style.display = 'table';
    document.getElementById('srv-body').innerHTML = srvs.map(s => {
      const icon = getPlatIcon(s.platform);
      const color = getPlatColor(s.platform);
      return `<tr>
        <td>
          <span class="badge-with-icon" style="border-color:${color}33;color:${color};">
            ${icon ? `<img src="${icon}" alt="${s.platform}" style="width:16px;height:16px;object-fit:contain;border-radius:2px;" onerror="this.style.display='none'">` : ''}
            ${s.platform}
          </span>
        </td>
        <td style="font-weight:600">${s.name}${s.description ? `<br><span style="font-size:11px;color:var(--muted)">${s.description}</span>` : ''}</td>
        <td class="mono text-muted" style="font-size:12px">${Number(s.min_qty).toLocaleString()} / ${Number(s.max_qty).toLocaleString()}</td>
        <td class="mono text-neon">৳${parseFloat(s.price_per_1k).toFixed(2)}</td>
        <td><button class="btn btn-outline btn-sm" onclick="openOrder(${s.id})">Order</button></td>
      </tr>`;
    }).join('');
  }

  function filterBy(plat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable(plat === 'all' ? allServices : allServices.filter(s => s.platform === plat));
  }

  function openOrder(id) {
    if (!Auth.isLoggedIn()) { window.location.href = 'login.html'; return; }
    selectedSrv = allServices.find(s => s.id === id);
    if (!selectedSrv) return;
    document.getElementById('modal-srv-name').textContent = `${selectedSrv.platform} — ${selectedSrv.name}`;
    document.getElementById('modal-price-label').textContent = `৳${parseFloat(selectedSrv.price_per_1k).toFixed(2)} per 1,000`;
    document.getElementById('modal-min-max').textContent = `${Number(selectedSrv.min_qty).toLocaleString()} – ${Number(selectedSrv.max_qty).toLocaleString()}`;
    document.getElementById('modal-qty').min = selectedSrv.min_qty;
    document.getElementById('modal-qty').max = selectedSrv.max_qty;
    document.getElementById('modal-qty').value = selectedSrv.min_qty;
    document.getElementById('modal-link').value = '';
    document.getElementById('modal-msg').innerHTML = '';
    updateModalCalc();
    document.getElementById('order-modal').classList.add('open');
  }

  function closeModal() { document.getElementById('order-modal').classList.remove('open'); }

  function updateModalCalc() {
    if (!selectedSrv) return;
    const qty = parseInt(document.getElementById('modal-qty').value) || 0;
    const charge = ((selectedSrv.price_per_1k / 1000) * qty).toFixed(2);
    document.getElementById('calc-qty').textContent = Number(qty).toLocaleString();
    document.getElementById('calc-charge').textContent = '৳' + charge;
  }

  async function submitOrder() {
    if (!selectedSrv) return;
    const link = document.getElementById('modal-link').value.trim();
    const qty  = parseInt(document.getElementById('modal-qty').value);
    const msg  = document.getElementById('modal-msg');
    const btn  = document.getElementById('modal-submit-btn');
    msg.innerHTML = '';

    if (!link) { msg.innerHTML = '<div class="alert alert-error">Enter the target URL.</div>'; return; }
    if (!qty || qty < selectedSrv.min_qty || qty > selectedSrv.max_qty) {
      msg.innerHTML = `<div class="alert alert-error">Quantity must be between ${selectedSrv.min_qty} and ${selectedSrv.max_qty}.</div>`; return;
    }

    btn.disabled = true; btn.innerHTML = '<span class="loader"></span>';
    try {
      const res = await apiCall('/api/orders', 'POST', {
        service_id: selectedSrv.id, quantity: qty, link
      });
      msg.innerHTML = `<div class="alert alert-success">Order placed! ID: #${res.order_id} — ৳${res.charge} charged.</div>`;
      btn.innerHTML = 'Place Order →'; btn.disabled = false;
      const u = Auth.getUser();
      if (u) {
        const newBal = (parseFloat(u.balance) - res.charge).toFixed(2);
        Auth.setSession(Auth.getToken(), { ...u, balance: newBal });
      }
      setTimeout(() => closeModal(), 2200);
    } catch(e) {
      msg.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
      btn.disabled = false; btn.innerHTML = 'Place Order →';
    }
  }

  document.getElementById('order-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('order-modal')) closeModal();
  });

  loadServices();
</script>
</body>
</html>
