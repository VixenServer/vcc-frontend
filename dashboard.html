<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — VCC Social Toolkit</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-box">VCC</div>
    <div class="nav-logo-text">VCC Social Toolkit</div>
  </a>
  <div class="nav-links">
    <a href="dashboard.html" class="nav-link active">Dashboard</a>
    <a href="services.html" class="nav-link">Services</a>
    <a href="orders.html" class="nav-link">Orders</a>
    <a href="deposit.html" class="nav-link">Add Funds</a>
    <span class="nav-balance" id="nav-bal">৳0.00</span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container">
  <div class="page-title">&gt; DASHBOARD</div>
  <div class="page-heading">Welcome, <span id="username" class="text-neon">—</span></div>

  <div class="stats-grid" id="stats">
    <div class="stat-box">
      <span class="stat-num" id="stat-balance">৳0.00</span>
      <span class="stat-label">Account Balance</span>
    </div>
    <div class="stat-box">
      <span class="stat-num" id="stat-orders">—</span>
      <span class="stat-label">Total Orders</span>
    </div>
    <div class="stat-box">
      <span class="stat-num" id="stat-pending">—</span>
      <span class="stat-label">Pending Orders</span>
    </div>
    <div class="stat-box">
      <span class="stat-num" id="stat-spent">৳0</span>
      <span class="stat-label">Total Spent</span>
    </div>
  </div>

  <div class="card">
    <div class="card-header">QUICK ACTIONS</div>
    <div style="display:flex; gap:12px; flex-wrap:wrap;">
      <a href="services.html" class="btn btn-neon">New Order</a>
      <a href="deposit.html" class="btn btn-outline">Add Funds</a>
      <a href="orders.html" class="btn btn-outline">View Orders</a>
    </div>
  </div>

  <div class="card">
    <div class="card-header">RECENT ORDERS</div>
    <div id="recent-orders">
      <div style="text-align:center; padding:20px; color:var(--muted); font-family:var(--mono); font-size:12px;">
        Loading...
      </div>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script>
  if (!requireLogin()) {}

  const user = Auth.getUser();
  if (user) {
    document.getElementById('username').textContent = user.username;
    document.getElementById('nav-bal').textContent = '৳' + (parseFloat(user.balance) || 0).toFixed(2);
    document.getElementById('stat-balance').textContent = '৳' + (parseFloat(user.balance) || 0).toFixed(2);
  }

  function logout() {
    Auth.clear();
    window.location.href = 'login.html';
  }

  async function loadDashboard() {
    try {
      const [me, orders] = await Promise.all([
        apiCall('/api/me'),
        apiCall('/api/orders')
      ]);

      // Update balance
      const bal = parseFloat(me.balance) || 0;
      document.getElementById('stat-balance').textContent = '৳' + bal.toFixed(2);
      document.getElementById('nav-bal').textContent = '৳' + bal.toFixed(2);
      Auth.setSession(Auth.getToken(), { ...user, balance: me.balance });

      // Order stats
      const pending = orders.filter(o => o.status === 'pending' || o.status === 'processing').length;
      const spent = orders.reduce((s, o) => s + o.charge, 0);
      document.getElementById('stat-orders').textContent = orders.length;
      document.getElementById('stat-pending').textContent = pending;
      document.getElementById('stat-spent').textContent = '৳' + spent.toFixed(0);

      // Recent orders table
      const recent = orders.slice(0, 8);
      if (recent.length === 0) {
        document.getElementById('recent-orders').innerHTML = `
          <div style="text-align:center; padding:30px; color:var(--muted); font-family:var(--mono); font-size:12px;">
            No orders yet. <a href="services.html" style="color:var(--neon)">Place your first order →</a>
          </div>`;
        return;
      }
      const platClass = {Facebook:'fb',Instagram:'ig',YouTube:'yt',TikTok:'tk',Telegram:'tg',Twitter:'tw'};
      document.getElementById('recent-orders').innerHTML = `
        <table class="vcc-table">
          <thead><tr>
            <th>#</th><th>Platform</th><th>Service</th>
            <th>Qty</th><th>Charge</th><th>Status</th><th>Date</th>
          </tr></thead>
          <tbody>
            ${recent.map(o => `<tr>
              <td class="mono text-muted">${o.id}</td>
              <td><span class="badge badge-${platClass[o.platform]||'fb'}">${o.platform}</span></td>
              <td>${o.service_name}</td>
              <td class="mono">${Number(o.quantity).toLocaleString()}</td>
              <td class="mono text-neon">৳${parseFloat(o.charge).toFixed(2)}</td>
              <td><span class="badge badge-${o.status}">${o.status}</span></td>
              <td class="text-muted" style="font-size:12px">${o.created_at.slice(0,10)}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    } catch (e) {
      if (e.message === 'Invalid token') { Auth.clear(); window.location.href = 'login.html'; }
    }
  }
  loadDashboard();
</script>
</body>
</html>
