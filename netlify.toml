# Netlify Configuration

[[redirects]]
  from = "/api/*"
  to = "https://vcc-backend-1be3.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin/api/*"
  to = "https://vcc-backend-1be3.onrender.com/admin/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "https://vcc-backend-1be3.onrender.com/health"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
