<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — VCC Social Toolkit</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-box">VCC</div>
    <div class="nav-logo-text">VCC Social Toolkit</div>
  </a>
  <div class="nav-links">
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <a href="services.html" class="nav-link">Services</a>
    <a href="orders.html" class="nav-link">Orders</a>
    <a href="deposit.html" class="nav-link">Add Funds</a>
    <a href="profile.html" class="nav-link active">Profile</a>
    <span class="nav-balance" id="nav-bal">৳0.00</span>
    <button class="btn-logout" onclick="Auth.clear();window.location.href='login.html'">Logout</button>
  </div>
</nav>

<div class="container">
  <div class="page-title">&gt; MY_PROFILE</div>
  <div class="page-heading">Account Settings</div>

  <div class="grid-2">

    <!-- Profile Info -->
    <div>
      <div class="card">
        <div class="card-header">ACCOUNT INFO</div>
        <div id="profile-info">
          <div style="text-align:center;padding:20px;color:var(--muted);font-family:var(--mono);font-size:12px;">Loading...</div>
        </div>
      </div>
    </div>

    <!-- Change Password -->
    <div>
      <div class="card">
        <div class="card-header">CHANGE PASSWORD</div>
        <div id="pw-msg"></div>
        <div class="form-group">
          <label>Current Password</label>
          <input type="password" id="pw-current" placeholder="Enter current password" />
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="pw-new" placeholder="Min 6 characters" />
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <input type="password" id="pw-confirm" placeholder="Repeat new password" />
        </div>
        <button class="btn btn-neon btn-full" onclick="changePassword()" id="pw-btn">Update Password →</button>
      </div>
    </div>

  </div>
</div>

<script src="js/config.js"></script>
<script>
  if (!requireLogin()) {}

  const u = Auth.getUser();
  if (u) document.getElementById('nav-bal').textContent = '৳' + (parseFloat(u.balance)||0).toFixed(2);

  async function loadProfile() {
    try {
      const me = await apiCall('/api/me');
      document.getElementById('profile-info').innerHTML = `
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;">
          <div style="width:52px;height:52px;background:rgba(0,255,157,0.1);border:1.5px solid var(--neon);
            display:flex;align-items:center;justify-content:center;
            font-family:var(--mono);font-size:16px;color:var(--neon);font-weight:700;">
            ${me.username.slice(0,2).toUpperCase()}
          </div>
          <div>
            <div style="font-size:18px;font-weight:700;color:var(--text);">${me.username}</div>
            <div style="font-size:12px;color:var(--muted);">${me.email}</div>
          </div>
        </div>
        <div style="border-top:1px solid var(--border);padding-top:14px;">
          <div class="sum-row" style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(0,255,157,0.06);font-size:13px;">
            <span style="color:var(--muted);">Username</span>
            <span class="mono text-neon">${me.username}</span>
          </div>
          <div class="sum-row" style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(0,255,157,0.06);font-size:13px;">
            <span style="color:var(--muted);">Email</span>
            <span class="mono" style="color:var(--text)">${me.email}</span>
          </div>
          <div class="sum-row" style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(0,255,157,0.06);font-size:13px;">
            <span style="color:var(--muted);">Balance</span>
            <span class="mono text-neon">৳${parseFloat(me.balance).toFixed(2)}</span>
          </div>
          <div class="sum-row" style="display:flex;justify-content:space-between;padding:7px 0;font-size:13px;">
            <span style="color:var(--muted);">Member Since</span>
            <span class="mono" style="color:var(--muted);font-size:12px;">${(me.created_at||'').slice(0,10)}</span>
          </div>
        </div>`;
    } catch(e) {
      if (e.message === 'Invalid token') { Auth.clear(); window.location.href = 'login.html'; }
    }
  }

  async function changePassword() {
    const current = document.getElementById('pw-current').value;
    const newPw   = document.getElementById('pw-new').value;
    const confirm = document.getElementById('pw-confirm').value;
    const msg     = document.getElementById('pw-msg');
    const btn     = document.getElementById('pw-btn');
    msg.innerHTML = '';

    if (!current || !newPw || !confirm) {
      msg.innerHTML = '<div class="alert alert-error">Please fill in all fields.</div>'; return;
    }
    if (newPw.length < 6) {
      msg.innerHTML = '<div class="alert alert-error">New password must be at least 6 characters.</div>'; return;
    }
    if (newPw !== confirm) {
      msg.innerHTML = '<div class="alert alert-error">New passwords do not match.</div>'; return;
    }
    if (current === newPw) {
      msg.innerHTML = '<div class="alert alert-warn">New password cannot be the same as the old password.</div>'; return;
    }

    btn.disabled = true; btn.innerHTML = '<span class="loader"></span>';
    try {
      const res = await apiCall('/api/change-password', 'POST', {
        current_password: current,
        new_password: newPw
      });
      msg.innerHTML = '<div class="alert alert-success">Password successfully changed! Please use your new password to login next time.</div>';
      document.getElementById('pw-current').value = '';
      document.getElementById('pw-new').value = '';
      document.getElementById('pw-confirm').value = '';
    } catch(e) {
      msg.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
    }
    btn.disabled = false; btn.innerHTML = 'Update Password →';
  }

  // Enter key support
  ['pw-current','pw-new','pw-confirm'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') changePassword();
    });
  });

  loadProfile();
</script>
</body>
</html>
